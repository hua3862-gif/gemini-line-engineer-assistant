name: Wake Up Bot

on:
  schedule:
    # 這行設定排程：每 10 分鐘執行一次
    # 使用 cron 語法，*/10 代表每 10 分鐘
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許您在 GitHub 頁面手動點擊執行

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the bot
        run: |
          # 請將下方的網址換成您 Render 專案的 /ping 網址
          curl -f https://gemini-line-engineer-assistant.onrender.com/ping
