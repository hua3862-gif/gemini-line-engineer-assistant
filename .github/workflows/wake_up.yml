name: Wake Up Bot

on:
  schedule:
    # 設定每 15 分鐘執行一次，避免 Render 免費實例休眠
    - cron: '*/15 * * * *'
  # 允許您在 GitHub 頁面的 Actions 分頁手動觸發測試
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the bot
        run: |
          # 向您的 Render 專案發送 GET 請求，觸發 /ping 路由
          curl -f https://gemini-line-engineer-assistant.onrender.com/ping
